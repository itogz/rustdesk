name: Build LJVDesk

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  APP_NAME: ${{ secrets.APP_NAME }}
  RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
  RELAY_SERVER: ${{ secrets.RELAY_SERVER }}
  RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
  DEFAULT_PASSWORD: ${{ secrets.DEFAULT_PASSWORD }}

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build Windows
        run: cargo build --release

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: LJVDesk-Windows
          path: target/release/rustdesk.exe

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Android APK
        run: |
          cd flutter
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: LJVDesk-Android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libxdo-dev libxcb-randr0-dev zip

      - name: Build Linux
        run: cargo build --release

      - name: Upload Linux
        uses: actions/upload-artifact@v3
        with:
          name: LJVDesk-Linux
          path: target/release/rustdesk
